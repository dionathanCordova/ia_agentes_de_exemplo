services:
  mysql:
    image: mysql:8.4
    container_name: ia_projeto_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agentes_db}
      MYSQL_USER: ${MYSQL_USER:-agente}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agente123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
